<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דירוג חתרנות מוסדית אנטי ציונית</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f5f8; color: #222; direction: rtl; line-height: 1.6; }
        a { color: #1565c0; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Nav */
        .top-nav { background: #fff; color: #222; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.1); border-bottom: 1px solid #e0e0e0; }
        .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .nav-title { font-size: 1.1em; font-weight: 700; padding: 12px 0; cursor: pointer; color: #222; }
        .nav-tabs { display: flex; }
        .nav-tab { padding: 14px 18px; cursor: pointer; font-size: 0.85em; border-bottom: 3px solid transparent; color: #666; white-space: nowrap; transition: all 0.2s; }
        .nav-tab:hover { color: #222; background: #f5f5f5; }
        .nav-tab.active { color: #222; border-bottom-color: #cc0000; font-weight: 600; }

        #app { padding: 20px; max-width: 1200px; margin: 0 auto; min-height: 60vh; }

        /* Hero */
        .ministry-hero { background: #fff; color: #222; border-radius: 12px; padding: 30px; margin: 0 auto 28px; max-width: 960px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); border: 1px solid #ddd; }
        .ministry-hero h2 { font-size: 1.3em; margin-bottom: 14px; color: #222; border-bottom: 1px solid #e0e0e0; padding-bottom: 10px; }
        .ministry-hero p { font-size: 0.92em; color: #444; line-height: 1.8; margin-bottom: 12px; }
        .ministry-hero strong { color: #222; }

        /* Legend */
        .level-legend { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 20px 24px; margin: 0 auto 24px; max-width: 960px; }
        .level-legend h3 { color: #1a1a2e; margin-bottom: 12px; font-size: 1.05em; cursor: pointer; display: flex; justify-content: space-between; }
        .level-legend h3 .arrow { font-size: 0.8em; color: #888; transition: transform 0.2s; }
        .level-legend.collapsed .legend-body { display: none; }
        .level-legend.collapsed .arrow { transform: rotate(180deg); }
        .legend-grid { display: flex; flex-direction: column; gap: 6px; }
        .legend-item { display: grid; grid-template-columns: 150px 80px 1fr; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; font-size: 0.88em; }
        .legend-stars { white-space: nowrap; line-height: 1; }
        .legend-name { font-weight: 700; color: #1a1a2e; white-space: nowrap; }
        .legend-desc { color: #666; font-size: 0.88em; }
        @media (max-width: 600px) {
            .legend-item { grid-template-columns: 1fr; gap: 4px; }
        }
        .star-red { color: #cc0000; }
        .star-david { color: #1a5fb4; }

        /* Idea Cards */
        .idea-card { max-width:900px; margin:0 auto 8px; background:#fff; border:1px solid #e0e0e0; border-radius:6px; border-right:4px solid #cc0000; }
        .idea-card summary { padding:14px 18px; cursor:pointer; display:flex; align-items:center; gap:12px; list-style:none; font-size:0.95em; }
        .idea-card summary::-webkit-details-marker { display:none; }
        .idea-card summary::before { content:''; width:8px; height:8px; border-left:2px solid #cc0000; border-bottom:2px solid #cc0000; transform:rotate(-45deg); transition:transform 0.2s; flex-shrink:0; }
        .idea-card[open] summary::before { transform:rotate(-225deg); }
        .idea-card summary:hover { background:#fafafa; }
        .idea-num { background:#cc0000; color:#fff; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.8em; font-weight:700; flex-shrink:0; }
        .idea-tag { margin-right:auto; background:#f0f0f0; padding:2px 8px; border-radius:10px; font-size:0.75em; color:#888; }
        .idea-detail { padding:0 18px 16px; border-top:1px solid #eee; }
        .idea-detail .iq { background:#fafafa; border-right:3px solid #cc0000; padding:12px 16px; margin:12px 0 8px; border-radius:0 4px 4px 0; font-style:italic; font-size:0.9em; color:#333; line-height:1.7; }
        .idea-detail .isrc { font-size:0.8em; color:#888; margin-bottom:10px; }
        .idea-detail .iecho { background:#fff8f0; border:1px dashed #e08800; padding:8px 12px; border-radius:4px; font-size:0.82em; margin-top:8px; }

        /* City Grid */
        .city-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; max-width: 960px; margin: 0 auto 30px; }
        .city-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 18px; cursor: pointer; transition: all 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .city-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: translateY(-2px); border-color: #cc0000; }
        .city-card .city-name { font-size: 1.15em; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
        .city-card .stars { font-size: 1.3em; letter-spacing: 2px; margin: 6px 0; }
        .city-card .level-label { font-size: 0.82em; font-weight: 600; padding: 3px 10px; border-radius: 12px; display: inline-block; color: #fff; }
        .city-card .justification { font-size: 0.82em; color: #666; margin-top: 8px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .city-card .meta-row { display: flex; gap: 12px; margin-top: 8px; font-size: 0.78em; color: #888; flex-wrap: wrap; }

        /* Back button */
        .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: #f0f0f5; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 0.9em; color: #555; margin-bottom: 16px; transition: all 0.2s; }
        .back-btn:hover { background: #e0e0e8; color: #222; }

        /* City Detail */
        .city-header { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 24px 28px; margin-bottom: 20px; max-width: 960px; margin-left: auto; margin-right: auto; }
        .city-header h1 { font-size: 1.5em; color: #1a1a2e; margin-bottom: 6px; }
        .city-header .stars { font-size: 1.6em; letter-spacing: 3px; margin: 8px 0; }
        .city-header .level-badge { display: inline-block; padding: 4px 14px; border-radius: 14px; color: #fff; font-weight: 600; font-size: 0.9em; }
        .city-header .justification-full { font-size: 0.92em; color: #555; margin-top: 12px; line-height: 1.7; }
        .city-header .actors { font-size: 0.85em; color: #cc0000; margin-top: 8px; }
        .city-header .source-link { font-size: 0.82em; margin-top: 8px; }
        .detail-wrap { max-width: 960px; margin: 0 auto; }

        .section-title { font-size: 1.15em; color: #1a1a2e; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 2px solid #eee; display: flex; align-items: center; gap: 8px; }
        .section-title .count { background: #cc0000; color: #fff; font-size: 0.7em; padding: 2px 8px; border-radius: 10px; }

        /* Protocol Card */
        .protocol-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 16px 20px; margin-bottom: 12px; border-right: 4px solid #cc8844; }
        .pc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
        .pc-category { font-size: 0.78em; padding: 2px 10px; border-radius: 10px; font-weight: 600; background: #fff3e0; color: #e65100; }
        .pc-outcome { font-size: 0.78em; padding: 2px 10px; border-radius: 10px; font-weight: 600; background: #fce4ec; color: #c62828; }
        .pc-date { font-size: 0.82em; color: #888; }
        .pc-summary { font-size: 0.92em; color: #333; line-height: 1.7; margin-bottom: 8px; }
        .pc-quote { background: #f9f5f0; border-right: 3px solid #cc8844; padding: 10px 14px; border-radius: 0 6px 6px 0; font-size: 0.85em; color: #555; line-height: 1.6; margin: 8px 0; }
        .pc-source { font-size: 0.78em; color: #888; margin-top: 6px; }
        .pc-source a { color: #1565c0; }
        .pc-proposer { font-size: 0.82em; color: #666; margin-top: 4px; }

        /* Program Card */
        .program-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 16px 20px; margin-bottom: 12px; transition: all 0.2s; }
        .program-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .pg-clickable { cursor: pointer; }
        .pg-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .pg-name { font-weight: 700; color: #1a1a2e; font-size: 1em; }
        .pg-org { font-size: 0.85em; color: #666; margin-top: 2px; }
        .pg-rating { font-size: 0.75em; padding: 2px 8px; border-radius: 10px; font-weight: 600; color: #fff; white-space: nowrap; }
        .pg-stats { display: flex; gap: 16px; margin-top: 8px; font-size: 0.82em; color: #555; flex-wrap: wrap; }
        .pg-concepts { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .concept-tag { font-size: 0.75em; padding: 2px 10px; border-radius: 10px; color: #fff; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .concept-tag:hover { opacity: 0.8; transform: scale(1.05); text-decoration: none; }
        .pg-source { font-size: 0.75em; color: #aaa; margin-top: 6px; }

        /* Program Expanded */
        .pg-expanded { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
        .pg-expanded.open { display: block; }
        .pg-why { margin-bottom: 12px; }
        .pg-why h4 { font-size: 0.92em; color: #8b0000; margin-bottom: 6px; }
        .pg-concept-explain { background: #fff5f5; border: 1px solid #fdd; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-size: 0.85em; }
        .pg-concept-explain .ce-label { font-weight: 600; margin-bottom: 4px; }
        .pg-concept-explain .ce-hidden { color: #cc0000; }
        .pg-concept-explain .ce-link { font-size: 0.82em; margin-top: 4px; }
        .pg-org-research { background: #f5f5ff; border: 1px solid #ddf; border-radius: 8px; padding: 12px 14px; margin-top: 10px; }
        .pg-org-research h4 { font-size: 0.92em; color: #1a1a2e; margin-bottom: 6px; }
        .pg-org-research .or-thesis { font-size: 0.85em; color: #555; margin-bottom: 6px; }
        .pg-org-research .or-findings { font-size: 0.82em; color: #666; padding-right: 16px; }
        .pg-org-research .or-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .or-link { font-size: 0.78em; padding: 3px 10px; background: #e8eaf6; border-radius: 6px; color: #1565c0; }

        /* Depth chain */
        .depth-section { margin-top: 12px; }
        .depth-section h4 { font-size: 0.92em; color: #8b0000; margin-bottom: 8px; }
        .depth-desc { border-right: 4px solid #cc0000; padding: 10px 14px; background: #fff5f5; border-radius: 0 8px 8px 0; margin-bottom: 12px; font-size: 0.88em; line-height: 1.6; }
        .depth-step { background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; border-right: 4px solid; }
        .ds-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .ds-icon { font-size: 1.2em; }
        .ds-title { font-weight: 700; color: #1a1a2e; font-size: 0.92em; }
        .ds-subtitle { font-size: 0.78em; color: #888; }
        .ds-summary { font-size: 0.85em; color: #444; line-height: 1.6; }
        .ds-content { margin-top: 8px; font-size: 0.85em; color: #555; line-height: 1.6; }
        .ds-next { font-size: 0.82em; color: #cc0000; font-style: italic; margin-top: 6px; }
        .depth-quote { background: #f9f5f0; border-right: 3px solid #cc8844; padding: 8px 12px; border-radius: 0 6px 6px 0; font-size: 0.88em; color: #555; margin: 6px 0; line-height: 1.5; }
        .depth-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .depth-link { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; background: #f0f0f5; color: #1565c0; border: 1px solid #ddd; border-radius: 8px; font-size: 0.82em; }
        .depth-link:hover { background: #e8e8f0; text-decoration: none; color: #1565c0; }

        /* News */
        .news-item { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; }
        .ni-title { font-size: 0.92em; color: #1a1a2e; }
        .ni-meta { font-size: 0.78em; color: #888; margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }

        /* Articles */
        .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; max-width: 960px; margin: 0 auto; }
        .article-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 20px; cursor: pointer; transition: all 0.2s; border-top: 4px solid; }
        .article-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-2px); }
        .article-card h3 { font-size: 1.1em; color: #1a1a2e; margin-bottom: 8px; }
        .article-card .surface { font-size: 0.85em; color: #666; margin-bottom: 8px; }
        .article-card .hidden { font-size: 0.85em; color: #cc0000; font-weight: 500; }
        .article-card .ev-count { font-size: 0.78em; color: #888; margin-top: 8px; }

        .article-detail { max-width: 800px; margin: 0 auto; }
        .article-detail h1 { font-size: 1.5em; color: #1a1a2e; margin-bottom: 12px; }
        .dual-meaning { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 16px 0; }
        .meaning-box { padding: 16px; border-radius: 10px; }
        .meaning-surface { background: #f0f8f0; border: 1px solid #c8e6c9; }
        .meaning-hidden { background: #fff5f5; border: 1px solid #ffcdd2; }
        .meaning-box h4 { font-size: 0.88em; margin-bottom: 6px; }
        .meaning-box p { font-size: 0.88em; line-height: 1.6; }
        .evidence-list { margin-top: 20px; }
        .evidence-item { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 14px 18px; margin-bottom: 10px; border-right: 3px solid #cc0000; }
        .ev-source { font-weight: 700; color: #1a1a2e; font-size: 0.9em; margin-bottom: 4px; }
        .ev-text { font-size: 0.88em; color: #444; line-height: 1.6; }
        .ev-url { font-size: 0.78em; margin-top: 6px; }
        .article-links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
        .article-ext-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: #f0f0f5; color: #1565c0; border: 1px solid #ddd; border-radius: 8px; font-size: 0.85em; }
        .article-ext-link:hover { background: #e8e8f0; text-decoration: none; color: #1565c0; }
        .article-programs { margin-top: 24px; background: #f5f5f8; border-radius: 10px; padding: 16px 20px; }
        .article-programs h3 { font-size: 1em; color: #1a1a2e; margin-bottom: 10px; }
        .ap-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #e8e8e8; font-size: 0.85em; }
        .ap-item:last-child { border-bottom: none; }

        /* Gap indicator */
        .gap-indicator { background: #fffde7; border: 1px solid #fff9c4; border-radius: 8px; padding: 10px 14px; font-size: 0.82em; color: #f57f17; margin-top: 12px; }

        /* About */
        .about-section { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 24px; max-width: 960px; margin: 30px auto; }
        .about-section h3 { color: #1a1a2e; margin-bottom: 12px; }
        .about-section p { font-size: 0.92em; color: #555; line-height: 1.7; margin-bottom: 10px; }
        .data-sources { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .source-tag { background: #f0f0f5; border: 1px solid #ddd; padding: 4px 12px; border-radius: 14px; font-size: 0.78em; color: #555; }
        footer { text-align: center; padding: 20px; color: #888; font-size: 0.82em; border-top: 1px solid #eee; margin-top: 30px; }
        footer a { color: #888; }

        @media (max-width: 768px) {
            .nav-inner { flex-direction: column; padding: 8px 16px; }
            .nav-tabs { width: 100%; overflow-x: auto; }
            .city-grid, .articles-grid { grid-template-columns: 1fr; }
            .dual-meaning { grid-template-columns: 1fr; }
            .ministry-hero { padding: 20px; }
            .city-header { padding: 16px; }
        }
    </style>
</head>

function renderStars(level) {
    let html = '';
    const redCount = level === 1 ? 0 : level;
    for (let i = 0; i < 7; i++) {
        if (i < redCount) html += svgStarRed();
        else html += svgStarDavid();
    }
    return html;
}

function getLevel(id) { return LEVELS.find(l => l.id === id); }

function getCityData(key) {
    if (typeof DATA === 'undefined') return null;
    return DATA.rankings.find(c => c.protocol_key === key || c.protocol_key === key.toUpperCase());
}

function getCityProtocols(key) {
    if (typeof PROTOCOL_FINDINGS === 'undefined') return [];
    return PROTOCOL_FINDINGS.findings.filter(f => f.city === key || f.city === key.toUpperCase());
}

function getConceptsForProgram(program) {
    const concepts = new Set();
    if (typeof SUSPICIOUS_CONCEPTS === 'undefined') return [];
    const text = (program.name || '') + ' ' + (program.org || '');
    SUSPICIOUS_CONCEPTS.keyword_rules.forEach(rule => {
        if (rule.pattern.test(text)) concepts.add(rule.concept);
    });
    // Also check depth chain name match → program_concepts
    if (typeof DEPTH_CHAINS !== 'undefined') {
        for (const [pid, dc] of Object.entries(DEPTH_CHAINS)) {
            if (dc.program_name === program.name && SUSPICIOUS_CONCEPTS.program_concepts[pid]) {
                SUSPICIOUS_CONCEPTS.program_concepts[pid].forEach(c => concepts.add(c));
            }
        }
    }
    return [...concepts];
}

function getDepthChain(programName) {
    if (typeof DEPTH_CHAINS === 'undefined') return null;
    for (const [id, data] of Object.entries(DEPTH_CHAINS)) {
        if (data.program_name === programName) return data;
    }
    return null;
}

function getOrgResearch(orgKey) {
    if (!orgKey || typeof RESEARCH_ORGS === 'undefined') return null;
    return RESEARCH_ORGS.orgs[orgKey] || null;
}

function getAllConcepts() {
    const result = {};
    if (typeof SUSPICIOUS_CONCEPTS !== 'undefined') {
        Object.entries(SUSPICIOUS_CONCEPTS.concepts).forEach(([k, v]) => { result[k] = v; });
    }
    Object.entries(BUILTIN_ARTICLES).forEach(([k, v]) => { result[k] = v; });
    return result;
}

        <h3 style="margin:16px 0 8px;font-size:1.05em">מיכאלי וקטקו-איילי — שני מסמכים, אותו מודל</h3>
        <p>
            ד"ר ניר מיכאלי וקרן קטקו-איילי פרסמו ב-2024
            <a href="https://meyda.education.gov.il/files/LishcatMadaan/research/politicaleducation-finalreport.pdf" target="_blank" style="color:#cc0000">דוח מחקר במימון לשכת המדען הראשי של משרד החינוך</a>:
            "חינוך פוליטי בעת משבר לאומי". הדוח מציע מודל REACT ומסגרת
            <a href="https://www.sciencedirect.com/science/article/pii/S0742051X25000915" target="_blank" style="color:#cc0000">SPEL</a>
            — "למידה חברתית-פוליטית-רגשית" — הרחבה של SEL עם ממד פוליטי מפורש.
        </p>
        <p>
            אותה חוקרת. אותו מודל פדגוגי. שני מסמכים:<br>
            <strong>2020</strong> (קהל אקדמי): "<a href="research/safeschool_evidence.html" target="_blank" style="color:#cc0000">פדגוגיה אקטיביסטית</a>" — הוראה שמטרתה שינוי חברתי. המורה כסוכן פוליטי.<br>
            <strong>2024</strong> (קהל ממשלתי): "חשיבה ביקורתית" — פיתוח כישורי חשיבה. מורה כמנחה ניטרלי.<br>
            קטקו-איילי מגדירה "אזרחות פעילה" כמודל שמטרתו שינוי מבני של החברה — לא השתתפות אזרחית רגילה.
            <a href="research/kibbutzim_pedagogy_dashboard.html" target="_blank" style="color:#cc0000">ניתוח מלא →</a>
        </p>

        <blockquote style="border-right:3px solid #ddd;padding:8px 16px;margin:16px 0;color:#444;font-style:italic;background:#f9f9f9">
            "אני הרבה פעמים הייתה לי תחושה כמורה שאני יכול לארגן הפיכה קומוניסטית בכיתה
            ואף אחד לא בכלל לא ירגיש וזה לא יזיז לאף אחד
            והם אפילו לא ידעו בדיוק להגיד בבית על מה בדיוק דיברנו בכיתה"
            <div style="font-style:normal;color:#666;margin-top:6px;font-size:0.85em">— ד"ר ניר מיכאלי, <a href="https://www.youtube.com/watch?v=lTtg0gbU-ZU&amp;t=3300" target="_blank" style="color:#888">הרצאה בבית ספר קדמה, דקה 55:00</a></div>
        </blockquote>

        <blockquote style="border-right:3px solid #ddd;padding:8px 16px;margin:8px 0;color:#444;font-style:italic;background:#f9f9f9">
            "כל פעם שדברים על ביג דאטה, קופצת לי הטראומה של פרסום נתוני המיצ"ב...
            ואנחנו צריכים להיות מאוד מאוד זהירים באיזה מידע אנחנו אוספים ואיזה מידע אנחנו לא אוספים"
            <div style="font-style:normal;color:#666;margin-top:6px;font-size:0.85em">— ד"ר ניר מיכאלי, <a href="https://www.youtube.com/watch?v=WUhBXXgCVsQ&amp;t=145" target="_blank" style="color:#888">ערוץ משרד החינוך, דקה 02:25</a></div>
        </blockquote>

        <p style="font-size:0.9em;color:#555;margin-top:12px">
            שתי האמירות יחד: בכיתה אפשר לעשות מה שרוצים, והורים לא ידעו. חשיפת נתונים היא "טראומה".
            הסתרת מידע מהורים אינה תקלה — אלא חלק מהשיטה.
            הרקע הזה קיים ברמת המדינה, דה-פקטו, ללא קשר לזהות הממשלה.
        </p>

        <h3 style="margin:20px 0 8px;font-size:1.05em">אונסק"ו — הממשק שממשיך לפעול</h3>
        <p>
            ישראל פרשה מאונסק"ו ב-2018. הממשקים המוסדיים לא נותקו: הוועד הישראלי לאונסק"ו פועל תחת משרד החינוך (שר החינוך כנשיא), 8+ קתדרות אונסק"ו באקדמיה ישראלית, תוכנית ISDG מיישמת יעדי SDGs בבתי ספר.
            "פדגוגיה ביקורתית" — השיטה שאונסק"ו מקדם — היא שינוי מותג של "פדגוגיה רדיקלית", שהיא עצמה עיבוד של שיטות מאו דזה-דונג.
            <a href="research/unesco_dashboard.html" target="_blank" style="color:#cc0000">מיפוי מלא →</a>
        </p>

        <h3 style="margin:20px 0 8px;font-size:1.05em">קדמה ירושלים — פדגוגיה ביקורתית כנורמה</h3>
        <p>
            בית הספר היחיד בישראל שפדגוגיה ביקורתית היא אתוס המייסוד שלו (1994). מבוסס על פאולו פריירה.
            ד"ר ניר מיכאלי (לשעבר יו"ר המזכירות הפדגוגית) הרצה בקדמה: "אני יכול לארגן הפיכה קומוניסטית בכיתה ואף אחד לא ירגיש".
            <a href="research/kedma_dashboard.html" target="_blank" style="color:#cc0000">מיפוי מלא →</a>
        </p>

        <h3 style="margin:20px 0 8px;font-size:1.05em">"כן בבית ספרנו" — ההגדרה המפורשת</h3>
        <p>
            ספר אקדמי (2014) בעריכת ניר מיכאלי שמגדיר באופן מפורש את הפדגוגיה הביקורתית כ<strong>"פרשנות מרקסיסטית"</strong>.
            במערכת: <strong>פרופ' יולי תמיר — שרת חינוך לשעבר</strong>, פרופ' נמרוד אלוני (כיסא אונסק"ו), רקטורית סמינר הקיבוצים.
            יצא בשיתוף הסתדרות המורים ומכון מופ"ת. הספר מגדיר את המורה כ"סוכן פוליטי" שמציג עמדותיו בגלוי.
            <a href="research/ken_bebeit_safrenu.html" target="_blank" style="color:#cc0000">ניתוח מלא →</a>
        </p>

        <h3 style="margin:20px 0 8px;font-size:1.05em">האקדמיה למדעים — כסות מדעית ל-SEL</h3>
        <p>
            האקדמיה הלאומית הישראלית למדעים הפיקה מסמך המלצות שהפך לבסיס ליישום SEL ארצי — תוך הודאה שאין בסיס אמפירי (136 מסגרות מושגיות, 1,300+ "מיומנויות", אפס ראיות ישירות).
            המסמך מציע "דמות בוגר" ברוח <strong>"דמוקרטיה ביקורתית"</strong> וממליץ על SEL כ"דרך חיים מערכתית".
            <a href="research/academy_sciences_dashboard.html" target="_blank" style="color:#cc0000">ניתוח מלא →</a>
        </p>

        <h3 style="margin:20px 0 8px;font-size:1.05em">מפת הרדיקלים — מי מכיר את מרקוזה?</h3>
        <p>
            11 דמויות מפתח בפדגוגיה ביקורתית בישראל. לא כל מי ששייך לשמאל הוא רדיקל — אבל מי שקרא את מרקוזה, פריירה, גרמשי ומשתמש בשיטותיהם מתוך מודעות מלאה — הוא חלק מרשת מוסדית.
            כל הציטוטים ממה שהאנשים עצמם אמרו, כתבו או פרסמו בפלטפורמות מקצועיות.
            <a href="research/radicals_dashboard.html" target="_blank" style="color:#cc0000">מיפוי מלא →</a>
        </p>

        <h3 style="margin:20px 0 8px;font-size:1.05em">SafeSchool — דוגמה בקנה מידה ארצי</h3>
        <p>
            תוכנית <a href="research/safeschool_dashboard.html" target="_blank" style="color:#cc0000">"בטיחות ברשת" (SafeSchool)</a> פועלת ב-1,200+ בתי ספר.
            מאחורי חומת תשלום, סרטון מלמד תלמידים חמש זהויות מגדריות.
            בדירקטוריון יושבים <a href="research/safeschool_dashboard.html#board" target="_blank" style="color:#cc0000">4 בכירים לשעבר ממשרד החינוך</a>, כולל מנכ"ל לשעבר כיו"ר ומשקיע.
            <a href="research/safeschool_evidence.html" target="_blank" style="color:#cc0000">ניתוח ראיות מלא →</a>
        </p>

        <h3 style="margin:20px 0 8px;font-size:1.05em">מה נמצא ברשויות המקומיות</h3>
        <p>
            מדד זה בוחן את התהליכים ברמת הרשויות — תחת הרקע המדינתי שתואר למעלה.
            537 פרוטוקולי מועצות עיר נסרקו. 23 החלטות מועצה מאומתות ב-5 ערים.

        </p>

function renderCityDetail(key) {
    const city = CITY_LEVELS.find(c => c.key === key);
    if (!city) { renderMainGrid(); return; }

    const lv = getLevel(city.level);
    const cd = getCityData(key);
    const protocols = getCityProtocols(key);
    const programs = cd ? filterPrograms(cd.proven_programs) : [];
    const news = cd ? (cd.news_actions_detail || []) : [];
    const totalDeploy = programs.reduce((s, p) => s + (p.deployments || 0), 0);
    const totalBudget = cd ? cd.proven_budget : 0;

    const app = document.getElementById('app');
    app.innerHTML = `
    <div class="detail-wrap">
        <div class="back-btn" onclick="navigate('#/')">&#8594; חזרה למדד</div>

        <!-- City Header -->
        <div class="city-header">

            <div class="justification-full">${escHtml(city.justification)}</div>
            ${city.key_actors.length ? `<div class="actors">שחקני מפתח: ${city.key_actors.map(a => escHtml(a)).join(' | ')}</div>` : ''}
            ${city.source_url ? `<div class="source-link">מקור: <a href="${city.source_url}" target="_blank" rel="noopener">${city.source_url}</a></div>` : ''}
            ${city.munzenberg_url ? `<div class="source-link"><a href="${city.munzenberg_url}" target="_blank" rel="noopener">ניתוח שיטת מינצנברג</a></div>` : ''}
            ${cd ? `<div class="meta-row" style="margin-top:12px">
                <span>תקציב חינוך כולל: ${formatBudget(cd.total_edu_budget)}</span>
                <span>תקציב תוכניות בעייתיות: ${formatBudget(totalBudget)} (${cd.proven_budget_pct || 0}%)</span>

        <!-- Protocols Section -->
        ${protocols.length > 0 ? `
        <h2 class="section-title">החלטות מועצת עיר <span class="count">${protocols.length}</span></h2>
        ${protocols.map(p => `
            <div class="protocol-card">
                <div class="pc-header">
                    <span class="pc-category">${escHtml(p.category_he || p.category)}</span>
                    <span class="pc-outcome">${escHtml(p.outcome_he || p.outcome)}</span>
                    ${p.date ? `<span class="pc-date">${p.date}</span>` : ''}
                </div>
                <div class="pc-summary">${escHtml(p.summary_he)}</div>
                ${p.quote_he ? `<div class="pc-quote">"${escHtml(p.quote_he)}"</div>` : ''}
                ${p.proposer ? `<div class="pc-proposer">יוזם/ת: ${escHtml(p.proposer)}</div>` : ''}
                <div class="pc-source">
                    מקור: ${p.document ? escHtml(p.document) : ''}
                    ${p.source_url ? ` | <a href="${p.source_url}" target="_blank" rel="noopener">קישור למקור</a>` : ''}
                </div>
            </div>
        `).join('')}
        ` : (city.findings > 0 ? `<h2 class="section-title">החלטות מועצת עיר <span class="count">${city.findings}</span></h2>
            <div class="gap-indicator">נתוני פרוטוקולים קיימים אך טרם נטענו למערכת.</div>` : '')}

        <!-- News Section -->

function renderProgramCard(program, index) {
    const concepts = getConceptsForProgram(program);
    const depth = getDepthChain(program.name);
    const orgRes = getOrgResearch(program.org_key);
    const allConcepts = getAllConcepts();
    const hasExpanded = concepts.length > 0 || depth || orgRes;
    const dashUrl = getProgramDashboard(program);

    return `
    <div class="program-card" id="prog-${index}">
        <div class="pg-clickable" onclick="${dashUrl ? `window.open('${dashUrl}', '_blank')` : `toggleProgram(${index})`}">
            <div class="pg-header">
                <div>
                    <div class="pg-name">${escHtml(program.name)}</div>
                    <div class="pg-org">${escHtml(program.org)}</div>
                </div>
                <span class="pg-rating" style="background:${ratingColor(program.rating)}">${program.rating}/5</span>
            </div>
            <div class="pg-stats">
                <span>תקציב: ${formatBudget(program.budget)}</span>
                <span>${program.deployments || 0} בתי ספר</span>
                ${program.tier ? `<span>שכבה: ${program.tier}</span>` : ''}
            </div>
            ${concepts.length > 0 ? `
            <div class="pg-concepts">
                ${concepts.map(c => {
                    const concept = allConcepts[c];
                    return concept ? `<a class="concept-tag" style="background:${concept.color}" href="#/article/${c}" onclick="event.stopPropagation()">${concept.short_label || concept.name_he}</a>` : '';
                }).join('')}
            </div>` : ''}
        </div>
        ${dashUrl ? `<div style="font-size:0.82em; color:#1565c0; margin-top:6px; font-weight:600;">&#8599; לחצו לפתוח מחקר מלא</div>` : ''}
        <div class="pg-source">מקור: ${escHtml(program.source || 'גפ"ן — קטלוג ההעשרה, משרד החינוך')}</div>

        ${hasExpanded ? `
        <div class="pg-expanded" id="pg-exp-${index}">
            <!-- Why problematic -->
            ${concepts.length > 0 ? `
            <div class="pg-why">
                <h4>למה התוכנית בעייתית?</h4>
                ${concepts.map(c => {
                    const concept = allConcepts[c];
                    if (!concept) return '';
                    return `
                    <div class="pg-concept-explain">
                        <div class="ce-label" style="color:${concept.color}">${concept.name_he}</div>
                        <div class="ce-hidden">${escHtml(concept.hidden_meaning).substring(0, 200)}${concept.hidden_meaning.length > 200 ? '...' : ''}</div>
                        <div class="ce-link"><a href="#/article/${c}">קרא עוד: מאמר מלא על ${concept.name_he} &larr;</a></div>
                    </div>`;
                }).join('')}
            </div>` : ''}

            <!-- Depth chain -->
            ${depth ? `
            <div class="depth-section">
                <h4>ראיות מעמיקות</h4>
                ${depth.deep_description ? `<div class="depth-desc">${depth.deep_description}</div>` : ''}
                ${(depth.depth_chain || []).map(step => `
                    <div class="depth-step" style="border-right-color:${step.color || '#cc0000'}">
                        <div class="ds-header">
                            <span class="ds-icon">${step.icon || ''}</span>
                            <div>
                                <div class="ds-title">${step.title_he || ''}</div>
                                <div class="ds-subtitle">${step.subtitle_he || ''}</div>
                            </div>
                        </div>
                        <div class="ds-summary">${step.summary_he || ''}</div>
                        <div class="ds-content">${step.content_he || ''}</div>
                        ${step.next_prompt ? `<div class="ds-next">${escHtml(step.next_prompt)}</div>` : ''}
                    </div>
                `).join('')}
                ${(depth.related_links || []).length > 0 ? `
                <div class="depth-links">
                    ${depth.related_links.map(l => `
                        <a class="depth-link" href="${l.url}" target="_blank" rel="noopener">
                            ${l.icon || ''} ${escHtml(l.title_he || '')}
                        </a>
                    `).join('')}
                </div>` : ''}
            </div>` : ''}

            <!-- Org research -->
            ${orgRes ? `
            <div class="pg-org-research">
                <h4>ארגון מפעיל: ${escHtml(orgRes.name_he)}</h4>
                <div class="or-thesis">${escHtml(orgRes.thesis)}</div>
                <ul class="or-findings">
                    ${(orgRes.key_findings || []).slice(0, 4).map(f => `<li>${escHtml(f)}</li>`).join('')}
                </ul>
                <div class="or-links">
                    ${orgRes.report_url ? `<a class="or-link" href="${orgRes.report_url}" target="_blank" rel="noopener">דוח מחקר מלא</a>` : ''}
                    ${(orgRes.source_links || []).map(sl => `<a class="or-link" href="${sl.url}" target="_blank" rel="noopener">${escHtml(sl.label)}</a>`).join('')}
                </div>
                <div style="font-size:0.78em;color:#888;margin-top:6px">
                    סיכון: ${orgRes.risk || '-'} | ניטרליות: ${orgRes.neutrality || '-'}/5 | שקיפות: ${orgRes.transparency || '-'}/5
                    | תקציב: ${formatBudget(orgRes.revenue_nis)}
                </div>
            </div>` : ''}
        </div>` : ''}
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
// VIEW: ARTICLE DETAIL
// ═══════════════════════════════════════════════════════════════

function renderArticleDetail(conceptId) {
    const allConcepts = getAllConcepts();
    const concept = allConcepts[conceptId];
    if (!concept) { renderArticles(); return; }

    // Find programs that trigger this concept
    const linkedPrograms = [];
    if (typeof DATA !== 'undefined') {
        DATA.rankings.forEach(city => {
            filterPrograms(city.proven_programs || []).forEach(p => {
                const concepts = getConceptsForProgram(p);
                if (concepts.includes(conceptId)) {
                    linkedPrograms.push({ program: p, city: city.city, cityKey: city.protocol_key });
                }
            });
        });
    }

    const app = document.getElementById('app');
    app.innerHTML = `
    <div class="article-detail">
        <div class="back-btn" onclick="navigate('#/articles')">&#8594; חזרה למאמרים</div>

        <h1 style="border-right:5px solid ${concept.color};padding-right:14px">${escHtml(concept.name_he)}</h1>

        <div class="dual-meaning">
            <div class="meaning-box meaning-surface">
                <h4 style="color:#2e7d32">מה ההורים שומעים</h4>
                <p>${escHtml(concept.surface_meaning)}</p>
            </div>
            <div class="meaning-box meaning-hidden">
                <h4 style="color:#c62828">מה המקורות האקדמיים אומרים</h4>
                <p>${escHtml(concept.hidden_meaning)}</p>
            </div>
        </div>

        <!-- Evidence chain -->
        <div class="evidence-list">
            <h2 class="section-title">שרשרת ראיות <span class="count">${(concept.evidence || []).length}</span></h2>
            ${(concept.evidence || []).map(ev => `
                <div class="evidence-item">
                    <div class="ev-source">${escHtml(ev.source)}</div>
                    <div class="ev-text">${escHtml(ev.text)}</div>
                    ${ev.url ? `<div class="ev-url"><a href="${ev.url}" target="_blank" rel="noopener">${ev.url}</a></div>` : ''}
                </div>
            `).join('')}
        </div>

        <!-- External links -->
        <div class="article-links">
            ${concept.research_url ? `<a class="article-ext-link" href="${concept.research_url}" target="_blank" rel="noopener">מחקר מלא &larr;</a>` : ''}
            ${concept.rosetta_url ? `<a class="article-ext-link" href="${concept.rosetta_url}" target="_blank" rel="noopener">אבן רוזטה &larr;</a>` : ''}
        </div>

        <!-- Linked programs -->
        ${linkedPrograms.length > 0 ? `
        <div class="article-programs">
            <h3>תוכניות המפעילות מושג זה <span class="count" style="background:#cc0000;color:#fff;padding:2px 8px;border-radius:10px;font-size:0.75em">${linkedPrograms.length}</span></h3>
            ${linkedPrograms.map(lp => `
                <div class="ap-item">
                    <span>
                        <strong>${escHtml(lp.program.name)}</strong>
                        <span style="color:#888;margin-right:8px">(${escHtml(lp.city)})</span>
                    </span>
                    <span>
                        ${formatBudget(lp.program.budget)}
                        | ${lp.program.deployments || 0} בתי ספר
                        <a href="#/city/${lp.cityKey}" style="margin-right:8px">לעיר &larr;</a>
                    </span>
                </div>
            `).join('')}
        </div>` : ''}
    </div>`;
}

function toggleProgram(index) {
    const exp = document.getElementById('pg-exp-' + index);
    if (exp) exp.classList.toggle('open');
}

function toggleLegend() {
    document.getElementById('legend').classList.toggle('collapsed');
}

// ═══════════════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════════════

function route() {
    const hash = location.hash || '#/';
    const tabs = document.querySelectorAll('#nav-tabs .nav-tab');
    tabs.forEach(t => t.classList.remove('active'));

    if (hash.startsWith('#/city/')) {
        tabs[0].classList.add('active');
        renderCityDetail(hash.split('/')[2]);
    } else if (hash.startsWith('#/article/')) {
        tabs[1].classList.add('active');
        renderArticleDetail(hash.split('/')[2]);
    } else if (hash === '#/articles') {
        tabs[1].classList.add('active');
        renderArticles();
    } else {
        tabs[0].classList.add('active');
        renderMainGrid();
    }

    window.scrollTo(0, 0);
}

window.addEventListener('hashchange', route);
route();
</script>
